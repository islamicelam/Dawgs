services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/src:/app/src
    restart: always
    env_file:
      - .env
    ports:
      - '${APP_PORT}:3001'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '5173:80'
    depends_on:
      - backend

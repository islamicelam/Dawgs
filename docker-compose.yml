services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/src:/app/src
    restart: always
    env_file:
      - .env
    ports:
      - '${APP_PORT}:3001'
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '5173:80'
    depends_on:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    restart: always
    environment: 
      - discovery.type=single-node
      - xpack.security.enabled=false        # выключаем HTTPS+пароль для локалки
      - ES_JAVA_OPTS=-Xms512m -Xmx512m       # лимит heap, иначе ES сожрёт всю память
    ports: 
      - '9200:9200'
    healthcheck: 
      test: ['CMD-SHELL', 'curl -s http://localhost:9200 >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  redis: 
    image: redis:7-alpine
    restart: always
    ports: 
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5